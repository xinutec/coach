---
name: build

# coach (Rust backend + Angular frontend) — gate on clippy + cargo test and the
# frontend's angular-eslint + the shared phone-layout harness (ui-check), then
# build + push xinutec/coach:latest to Docker Hub. The k8s manifests + deploy
# live in the home monorepo (xinutec/pippijn code/kubes/coach/k8s); the image tag
# is the only contract between this repo and the deploy.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**/flake.lock"
  workflow_dispatch: {}

jobs:
  verify:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    container: rust:1-bookworm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      # Cache ~/.cargo + target/ (keyed on Cargo.lock) — else the container
      # re-downloads and re-compiles the whole dep tree every push.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: rustup component add clippy
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  fe-verify:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      # ui-check builds (prod) then runs the shared layout harness (text overlap,
      # horizontal overflow, occluded controls) at phone + wide viewports.
      - run: npx playwright install --with-deps chromium
      - run: npm run ui-check

  image:
    needs: [verify, fe-verify]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          tags: xinutec/coach:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=registry,ref=xinutec/coach:cache
          # mode=max persists the builder-stage layers (npm ci, cargo deps) too.
          cache-to: type=registry,ref=xinutec/coach:cache,mode=max
