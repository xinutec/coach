---
name: build

# coach (Rust backend + Angular frontend) — gate on clippy + cargo test and the
# frontend's angular-eslint + the shared phone-layout harness (ui-check), then
# build + push xinutec/coach:latest to Docker Hub. The k8s manifests + deploy
# live in the home monorepo (xinutec/pippijn code/kubes/coach/k8s); the image tag
# is the only contract between this repo and the deploy.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**/flake.lock"
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    container: rust:1-bookworm
    steps:
      - uses: actions/checkout@v6
      # Cache ~/.cargo + target/ (keyed on Cargo.lock) — else the container
      # re-downloads and re-compiles the whole dep tree every push.
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add clippy
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  fe-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      # ui-check builds (prod) then runs the shared layout harness (text overlap,
      # horizontal overflow, occluded controls) at phone + wide viewports.
      - run: npx playwright install --with-deps chromium
      - run: npm run ui-check

  image:
    needs: [verify, fe-verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: xinutec/coach:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=registry,ref=xinutec/coach:cache
          # mode=max persists the builder-stage layers (npm ci, cargo deps) too.
          cache-to: type=registry,ref=xinutec/coach:cache,mode=max
