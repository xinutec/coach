<h2>History</h2>

@if (!loading() && sets().length === 0) {
  <p class="empty">No sets logged yet. Log one from the Today tab.</p>
}

@for (g of groups(); track g.key) {
  <button class="day" (click)="toggle(g.key)" [attr.aria-expanded]="isOpen(g.key)">
    <mat-icon class="chev">{{ isOpen(g.key) ? "expand_more" : "chevron_right" }}</mat-icon>
    <span class="day-label">{{ g.label }}</span>
    <span class="day-count">{{ g.sets.length }} set{{ g.sets.length === 1 ? "" : "s" }}</span>
  </button>
  @if (isOpen(g.key)) {
    @for (s of g.sets; track s.id) {
      <div class="set-row">
        <div class="set-main">
          <span class="set-name">{{ name(s.exerciseId) }}</span>
          <span class="set-detail">{{ detail(s) }}</span>
        </div>
        <span class="set-time">{{ time(s) }}</span>
        <button mat-icon-button aria-label="Delete set" (click)="del(s)">
          <mat-icon>delete_outline</mat-icon>
        </button>
      </div>
    }
  }
}
